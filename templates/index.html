<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>王珊珊专用AI 简历优化助手</title>
    <style>
        * { box-sizing: border-box; }

        body {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* 顶部标题 */
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 32px; margin-bottom: 5px; }
        .header p   { opacity: 0.85; }

        /* 输入卡片 */
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        .card label {
            font-weight: 600;
            color: #333;
            display: block;
            margin-bottom: 8px;
        }

        textarea {
            width: 100%;
            height: 220px;
            font-size: 14px;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            resize: vertical;
            transition: border-color 0.3s;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        /* 功能按钮组 */
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .actions button {
            flex: 1;
            min-width: 120px;
            padding: 12px 16px;
            font-size: 15px;
            font-weight: 600;
            border: 2px solid #667eea;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover { background: #5a6fd6; transform: translateY(-1px); }
        .btn-outline {
            background: white;
            color: #667eea;
        }
        .btn-outline:hover { background: #f0f0ff; }

        /* 加载动画 */
        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 结果卡片 */
        .result-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            display: none;
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .result-header h2 { margin: 0; color: #333; }
        .btn-copy {
            padding: 6px 16px;
            font-size: 13px;
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-copy:hover { background: #e8e8e8; }
        .result-body {
            line-height: 1.9;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="{{ url_for('static', filename='photo.jpg') }}" alt="王珊珊"
             style="width:120px; height:120px; border-radius:50%; border:4px solid white;
                    object-fit:cover; margin-bottom:15px;">
        <h1>王珊珊专用 AI 简历优化助手</h1>
        <p>粘贴简历，选择功能，AI 帮你优化</p>
    </div>

    <div class="card">
        <form id="resumeForm" method="POST">
            <label for="resumeArea">📄 你的简历内容</label>
            <textarea id="resumeArea" name="resume"
                placeholder="在这里粘贴你的简历内容...">{% if resume_text %}{{ resume_text }}{% endif %}</textarea>

            <div class="actions">
                <button type="submit" class="btn-primary" name="action" value="score">
                    评分 + 建议
                </button>
                <button type="submit" class="btn-outline" name="action" value="project">
                    优化项目经历
                </button>
                <button type="submit" class="btn-outline" name="action" value="self_eval">
                    优化自我评价
                </button>
                <button type="submit" class="btn-outline" name="action" value="intro">
                    生成自我介绍
                </button>
            </div>
        </form>
    </div>

    <!-- 加载动画 -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p style="color: white;">AI 正在分析你的简历...</p>
    </div>

    <!-- 结果卡片 -->
    {% if result %}
    <div class="result-card" id="resultCard" style="display:block;">
        <div class="result-header">
            <h2>分析结果</h2>
            <button class="btn-copy" onclick="copyResult()">复制内容</button>
        </div>
        <div class="result-body" id="resultBody">{{ result }}</div>
    </div>
    {% else %}
    <div class="result-card" id="resultCard"></div>
    {% endif %}

    <script>
        // 点按钮时显示加载动画
        document.getElementById('resumeForm').addEventListener('submit', function() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultCard').style.display = 'none';
        });

        // 复制结果到剪贴板
        function copyResult() {
            var text = document.getElementById('resultBody').innerText;
            navigator.clipboard.writeText(text).then(function() {
                var btn = event.target;
                btn.textContent = '已复制！';
                setTimeout(function() { btn.textContent = '复制内容'; }, 2000);
            });
        }
    </script>

</body>
</html>
