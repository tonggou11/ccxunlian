<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>AI 面试模拟器</title>
    <style>
        * { box-sizing: border-box; }
        body {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 { color: white; margin-bottom: 5px; }
        .header p  { color: #8b949e; font-size: 14px; }

        /* 角色选择卡片 */
        .role-cards {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .role-card {
            flex: 1;
            min-width: 120px;
            padding: 16px;
            text-align: center;
            background: #161b22;
            border: 2px solid #30363d;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .role-card:hover { border-color: #58a6ff; }
        .role-card.selected  { border-color: #58a6ff; background: #1a2332; }
        .role-card .icon { font-size: 28px; margin-bottom: 6px; }
        .role-card .title { font-weight: 600; color: white; }
        .role-card .sub { font-size: 12px; color: #8b949e; margin-top: 4px; }

        .btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            background: #238636;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn:hover { background: #2ea043; }
        .btn:disabled { background: #30363d; color: #8b949e; cursor: not-allowed; }

        /* 聊天区 */
        .chat-area {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .msg {
            display: flex;
            gap: 10px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg .avatar {
            width: 34px; height: 34px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px; flex-shrink: 0;
        }
        .msg.interviewer .avatar { background: #238636; }
        .msg.user .avatar { background: #1f6feb; }

        .msg .bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.7;
            white-space: pre-wrap;
        }
        .msg.interviewer .bubble {
            background: #161b22;
            border: 1px solid #30363d;
            border-bottom-left-radius: 4px;
        }
        .msg.user .bubble {
            background: #1f6feb;
            color: white;
            border-bottom-right-radius: 4px;
        }

        /* 输入区 */
        .input-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .input-row textarea {
            flex: 1;
            padding: 12px;
            font-size: 14px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: white;
            resize: vertical;
            min-height: 50px;
        }
        .input-row textarea:focus {
            outline: none;
            border-color: #58a6ff;
        }

        .loading {
            display: none;
            align-items: center;
            gap: 8px;
            color: #8b949e;
            padding: 12px 0;
        }
        .dots span {
            display: inline-block;
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #58a6ff;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dots span:nth-child(1) { animation-delay: -0.32s; }
        .dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* 历史 */
        .history {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #30363d;
        }
        .history h3 { color: #8b949e; font-size: 14px; margin-bottom: 10px; }
        .history a {
            color: #58a6ff;
            text-decoration: none;
            margin-right: 15px;
            font-size: 13px;
        }
        .history a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="header">
        <h1>AI 面试模拟器</h1>
        <p>选择岗位，AI 扮演面试官，模拟真实面试</p>
    </div>

    <!-- 角色选择 -->
    <div class="role-cards" id="roleCards">
        <div class="role-card selected" data-role="python" onclick="selectRole('python')">
            <div class="icon">🐍</div>
            <div class="title">Python 后端</div>
            <div class="sub">Python · Flask · 数据库</div>
        </div>
        <div class="role-card" data-role="frontend" onclick="selectRole('frontend')">
            <div class="icon">🎨</div>
            <div class="title">前端开发</div>
            <div class="sub">HTML/CSS · JS · 框架</div>
        </div>
        <div class="role-card" data-role="ai" onclick="selectRole('ai')">
            <div class="icon">🤖</div>
            <div class="title">AI 应用开发</div>
            <div class="sub">LLM · RAG · Prompt</div>
        </div>
        <div class="role-card" data-role="product" onclick="selectRole('product')">
            <div class="icon">📋</div>
            <div class="title">产品经理</div>
            <div class="sub">需求 · 数据 · 项目</div>
        </div>
    </div>

    <div style="text-align:center; margin-bottom:20px;">
        <button class="btn" id="startBtn" onclick="startInterview()">开始面试</button>
    </div>

    <!-- 聊天区 -->
    <div class="chat-area" id="chatArea"></div>

    <!-- 加载动画 -->
    <div class="loading" id="loading">
        <div class="dots"><span></span><span></span><span></span></div>
        AI 面试官正在思考...
    </div>

    <!-- 输入区 -->
    <div class="input-row" id="inputRow" style="display:none;">
        <textarea id="answerInput" placeholder="输入你的回答..."
            onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault(); submitAnswer();}"></textarea>
        <button class="btn" onclick="submitAnswer()">回答</button>
    </div>

    <!-- 历史 -->
    {% if sessions %}
    <div class="history">
        <h3>历史面试记录</h3>
        {% for s in sessions %}
        <a href="#">#{{ s[0] }} {{ s[1] }} ({{ s[2] }})</a>
        {% endfor %}
    </div>
    {% endif %}

    <script>
        var selectedRole = 'python';
        var sessionId = null;
        var messages = [];  // 完整的对话历史，发给 AI 保持上下文

        function selectRole(role) {
            selectedRole = role;
            document.querySelectorAll('.role-card').forEach(function(c) {
                c.classList.remove('selected');
            });
            document.querySelector('[data-role="' + role + '"]').classList.add('selected');
        }

        async function startInterview() {
            // 禁用按钮，防止重复点击
            document.getElementById('startBtn').disabled = true;
            document.getElementById('chatArea').innerHTML = '';
            messages = [];
            showLoading(true);

            try {
                var response = await fetch('/api/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role: selectedRole })
                });
                var data = await response.json();
                sessionId = data.session_id;

                // 建 system prompt 消息（前端不显示，只发给 AI）
                messages.push({ role: 'system', content: 'role:' + selectedRole });
                messages.push({ role: 'assistant', content: data.message });

                appendMessage('interviewer', data.message);
                showInput(true);
            } catch (err) {
                appendMessage('interviewer', '启动失败，请检查服务器。');
            }

            showLoading(false);
        }

        async function submitAnswer() {
            var input = document.getElementById('answerInput');
            var answer = input.value.trim();
            if (!answer) return;

            // 显示自己的回答
            appendMessage('user', answer);
            messages.push({ role: 'user', content: answer });
            input.value = '';
            showInput(false);
            showLoading(true);

            try {
                var response = await fetch('/api/answer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId,
                        answer: answer,
                        role: selectedRole,
                        messages: messages
                    })
                });
                var data = await response.json();

                messages.push({ role: 'assistant', content: data.message });
                appendMessage('interviewer', data.message);
            } catch (err) {
                appendMessage('interviewer', '请求失败，请重试。');
            }

            showLoading(false);
            showInput(true);
            scrollToBottom();
        }

        function appendMessage(role, text) {
            var chat = document.getElementById('chatArea');
            var msg = document.createElement('div');
            msg.className = 'msg ' + role;

            var avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.innerText = role === 'interviewer' ? '🎯' : '👤';

            var bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerText = text;

            msg.appendChild(avatar);
            msg.appendChild(bubble);
            chat.appendChild(msg);
            scrollToBottom();
        }

        function showInput(show) {
            document.getElementById('inputRow').style.display = show ? 'flex' : 'none';
            if (show) document.getElementById('answerInput').focus();
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'flex' : 'none';
        }

        function scrollToBottom() {
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>

</body>
</html>
